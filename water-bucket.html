<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Bucket Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .animation-container {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            background: linear-gradient(to bottom, #e3f2fd, #fff);
            border-radius: 15px;
            padding: 30px;
            min-height: 400px;
        }

        svg {
            max-width: 100%;
            height: auto;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-weight: 600;
            color: #555;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: background 0.2s;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            background: #764ba2;
        }

        .control-group input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .control-group input[type="range"]::-moz-range-thumb:hover {
            background: #764ba2;
        }

        .value-display {
            font-size: 12px;
            color: #888;
            font-weight: 500;
        }

        .stats {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 13px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .stat-value.percentage {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚰 Water Bucket Simulator</h1>

        <div class="animation-container">
            <svg viewBox="0 0 400 500" width="400" height="500">
                <!-- Background -->
                <rect width="400" height="500" fill="#f0f4f8"/>

                <!-- Faucet -->
                <g id="faucet">
                    <!-- Faucet pipe -->
                    <rect x="160" y="20" width="80" height="40" fill="#c0c0c0" rx="5"/>
                    <circle cx="200" cy="40" r="15" fill="#888"/>
                    <!-- Water stream -->
                    <g id="water-stream">
                        <path id="stream-path" d="M 200 60 Q 195 100 190 140" stroke="#4fc3f7" stroke-width="8" fill="none" stroke-linecap="round"/>
                    </g>
                </g>

                <!-- Bucket -->
                <g id="bucket">
                    <!-- Bucket outline -->
                    <path d="M 100 200 L 120 420 L 280 420 L 300 200 Z" stroke="#8b7355" stroke-width="3" fill="none"/>
                    <!-- Bucket handle -->
                    <path d="M 120 200 Q 200 120 280 200" stroke="#8b7355" stroke-width="4" fill="none"/>
                    <!-- Max fill line -->
                    <line id="max-fill-line" x1="100" y1="250" x2="300" y2="250" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
                </g>

                <!-- Water in bucket (clipped) -->
                <defs>
                    <clipPath id="bucket-clip">
                        <path d="M 100 200 L 120 420 L 280 420 L 300 200 Z"/>
                    </clipPath>
                </defs>

                <g clip-path="url(#bucket-clip)">
                    <rect id="water" x="100" y="200" width="200" height="220" fill="#4fc3f7" opacity="0.8"/>
                </g>

                <!-- Hole in bucket -->
                <g id="hole">
                    <circle cx="295" cy="380" r="6" fill="#333"/>
                    <!-- Water dripping from hole -->
                    <g id="drip">
                        <circle id="drip-circle" cx="295" cy="395" r="3" fill="#4fc3f7" opacity="0"/>
                    </g>
                </g>

                <!-- Water level indicator line -->
                <line id="water-level" x1="100" y1="420" x2="300" y2="420" stroke="#0277bd" stroke-width="2"/>
            </svg>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="inflow">Inflow Rate</label>
                <input type="range" id="inflow" min="0" max="100" value="30">
                <div class="value-display"><span id="inflow-value">30</span>%</div>
            </div>
            <div class="control-group">
                <label for="hole-size">Hole Size</label>
                <input type="range" id="hole-size" min="0" max="100" value="20">
                <div class="value-display"><span id="hole-size-value">20</span>%</div>
            </div>
            <div class="control-group">
                <label for="capacity">Bucket Capacity</label>
                <input type="range" id="capacity" min="50" max="300" value="200">
                <div class="value-display"><span id="capacity-value">200</span> units</div>
            </div>
            <div class="control-group">
                <label for="max-fill">Max Fill Line</label>
                <input type="range" id="max-fill" min="0" max="100" value="80">
                <div class="value-display"><span id="max-fill-value">80</span>%</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Current Level</div>
                <div class="stat-value percentage"><span id="level-percentage">0</span>%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Water Volume</div>
                <div class="stat-value"><span id="water-volume">0</span> units</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Inflow</div>
                <div class="stat-value"><span id="inflow-rate">0</span> u/s</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Outflow</div>
                <div class="stat-value"><span id="outflow-rate">0</span> u/s</div>
            </div>
        </div>
    </div>

    <script>
        // Simulation state
        let state = {
            waterLevel: 0, // in units
            capacity: 200,
            inflowRate: 30, // units per second (percentage of max)
            holeSize: 20, // percentage
            maxFillLine: 80, // percentage
            timestamp: Date.now()
        };

        const maxInflowRate = 100; // units per second
        const maxOutflowRate = 100; // units per second

        // Get control elements
        const inflowControl = document.getElementById('inflow');
        const holeSizeControl = document.getElementById('hole-size');
        const capacityControl = document.getElementById('capacity');
        const maxFillControl = document.getElementById('max-fill');

        // SVG elements
        const waterRect = document.getElementById('water');
        const waterLevelLine = document.getElementById('water-level');
        const maxFillLine = document.getElementById('max-fill-line');
        const dripCircle = document.getElementById('drip-circle');
        const streamPath = document.getElementById('stream-path');

        // Display elements
        const levelPercentageDisplay = document.getElementById('level-percentage');
        const waterVolumeDisplay = document.getElementById('water-volume');
        const inflowRateDisplay = document.getElementById('inflow-rate');
        const outflowRateDisplay = document.getElementById('outflow-rate');

        function updateControls() {
            state.inflowRate = parseFloat(inflowControl.value);
            state.holeSize = parseFloat(holeSizeControl.value);
            state.capacity = parseFloat(capacityControl.value);
            state.maxFillLine = parseFloat(maxFillControl.value);

            document.getElementById('inflow-value').textContent = state.inflowRate;
            document.getElementById('hole-size-value').textContent = state.holeSize;
            document.getElementById('capacity-value').textContent = state.capacity;
            document.getElementById('max-fill-value').textContent = state.maxFillLine;

            // Update max fill line position
            const bucketTop = 200;
            const bucketBottom = 420;
            const bucketHeight = bucketBottom - bucketTop;
            const maxFillPosition = bucketBottom - (bucketHeight * state.maxFillLine / 100);
            maxFillLine.setAttribute('y1', maxFillPosition);
            maxFillLine.setAttribute('y2', maxFillPosition);
        }

        function simulate(deltaTime) {
            // Calculate inflow
            const inflow = (state.inflowRate / 100) * maxInflowRate * deltaTime;

            // Calculate outflow (only if water level > 0 and hole size > 0)
            let outflow = 0;
            if (state.waterLevel > 0 && state.holeSize > 0) {
                // Outflow increases with water pressure (height) and hole size
                const pressure = Math.sqrt(state.waterLevel / state.capacity); // Simplified physics
                const holeFactor = (state.holeSize / 100) * maxOutflowRate;
                outflow = pressure * holeFactor * deltaTime;
            }

            // Update water level
            state.waterLevel += inflow - outflow;
            state.waterLevel = Math.max(0, Math.min(state.waterLevel, state.capacity));

            return { inflow, outflow };
        }

        function updateVisualization(inflow, outflow) {
            const bucketTop = 200;
            const bucketBottom = 420;
            const bucketHeight = bucketBottom - bucketTop;
            const waterHeightPercent = (state.waterLevel / state.capacity) * 100;
            const waterHeight = bucketHeight * waterHeightPercent / 100;
            const waterY = bucketBottom - waterHeight;

            // Update water rect
            waterRect.setAttribute('y', waterY);
            waterRect.setAttribute('height', waterHeight);

            // Update water level line
            waterLevelLine.setAttribute('y1', waterY);
            waterLevelLine.setAttribute('y2', waterY);

            // Update displays
            levelPercentageDisplay.textContent = Math.round(waterHeightPercent);
            waterVolumeDisplay.textContent = Math.round(state.waterLevel);
            inflowRateDisplay.textContent = (inflow / 0.016).toFixed(1); // Convert to units/second
            outflowRateDisplay.textContent = (outflow / 0.016).toFixed(1);

            // Update drip animation (drips when hole is active and water > 0)
            if (state.holeSize > 0 && state.waterLevel > 0) {
                dripCircle.setAttribute('opacity', '0.8');
            } else {
                dripCircle.setAttribute('opacity', '0');
            }

            // Update stream opacity based on inflow
            const streamOpacity = Math.min(1, state.inflowRate / 50);
            streamPath.setAttribute('opacity', streamOpacity);
        }

        function animate() {
            const now = Date.now();
            const deltaTime = (now - state.timestamp) / 1000; // Convert to seconds
            state.timestamp = now;

            // Cap deltaTime to prevent large jumps
            const cappedDeltaTime = Math.min(deltaTime, 0.016);

            const { inflow, outflow } = simulate(cappedDeltaTime);
            updateVisualization(inflow, outflow);

            requestAnimationFrame(animate);
        }

        // Event listeners
        inflowControl.addEventListener('input', updateControls);
        holeSizeControl.addEventListener('input', updateControls);
        capacityControl.addEventListener('input', updateControls);
        maxFillControl.addEventListener('input', updateControls);

        // Initialize
        updateControls();
        animate();
    </script>
</body>
</html>
